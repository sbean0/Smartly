<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smartly Ideas — Submit Suggestion</title>
  
  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Inter', sans-serif;
      background: #121212;
      color: #e0e0e0;
      line-height: 1.6;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    .container {
      max-width: 600px;
      margin: 4rem auto;
      padding: 2rem;
      background: #1e1e1e;
      border-radius: 12px;
      border: 1px solid #333;
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 0.5rem;
      color: #fff;
    }
    
    .subtitle {
      color: #888;
      margin-bottom: 2rem;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    label {
      font-weight: 600;
      color: #ccc;
      margin-bottom: 0.5rem;
      display: block;
    }

    input, textarea {
      width: 100%;
      padding: 1rem;
      background: #2a2a2a;
      border: 1px solid #444;
      border-radius: 8px;
      color: #fff;
      font-family: inherit;
      font-size: 1rem;
    }
    
    input:focus, textarea:focus {
      outline: none;
      border-color: #4ade80;
    }

    button {
      background: #4ade80;
      color: #000;
      padding: 1rem;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      font-size: 1.1rem;
      transition: background 0.2s;
    }

    button:hover {
      background: #22c55e;
    }

    footer {
      margin-top: auto;
      text-align: center;
      padding: 2rem;
      color: #666;
      font-size: 0.9rem;
    }
    
    footer a { color: #888; text-decoration: none; }
    footer a:hover { color: #fff; }

  </style>
</head>
<body>

  <div class="container">
    <h1>Submit an Idea</h1>
    <p class="subtitle">Help us shape the future of Smartly Academy. What features or modules should we build next?</p>
    
    <!-- FormSubmit.co is a free service for static sites. 
         Replace YOUR_EMAIL_ADDRESS_HERE with the actual target email. -->
    <form action="https://formsubmit.co/YOUR_EMAIL_ADDRESS_HERE" method="POST">
      <!-- Configuration: Redirect back to site after submission -->
      <input type="hidden" name="_next" value="https://smartly.academy/ideas.html?submitted=true">
      <input type="hidden" name="_subject" value="New Smartly Idea Submission">
      <input type="hidden" name="_captcha" value="false">

      <div>
        <label for="name">Name (Optional)</label>
        <input type="text" name="name" id="name" placeholder="How should we address you?">
      </div>

      <div>
        <label for="email">Email (Optional)</label>
        <input type="email" name="email" id="email" placeholder="If you'd like a follow-up">
      </div>

      <div>
        <label for="message">Your Idea</label>
        <textarea name="message" id="message" rows="6" required placeholder="Describe your feature idea, module suggestion, or feedback..."></textarea>
      </div>

      <button type="submit">Send Idea</button>
    </form>
  </div>

  <footer>
    <p>&copy; 2026 Smartly Academy. <a href="index.html">Back to Main</a></p>
  </footer>

  <script>
    // Simple check for URL parameter to show thank you message
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.get('submitted') === 'true') {
      document.querySelector('.container').innerHTML = `
        <div style="text-align: center; padding: 2rem 0;">
          <h1 style="color: #4ade80;">Thank You!</h1>
          <p style="color: #ccc; margin-bottom: 2rem;">Your idea has been submitted successfully.</p>
          <a href="index.html" style="background: #333; color: #fff; padding: 0.8rem 1.5rem; border-radius: 50px; text-decoration: none;">Return Home</a>
        </div>
      `;
    }
  </script>

</body>
</html>
