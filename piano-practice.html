<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smartly Piano Prototype</title>
  <style>
    body {
      background: #121212;
      color: #fff;
      font-family: 'Inter', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      overflow: hidden;
    }
    h1 { margin-bottom: 2rem; color: #4ade80; }
    
    .piano-container {
      position: relative;
      display: flex;
      justify-content: center;
      background: #222;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      width: 100%;
      overflow: hidden; /* Prevent scroll */
    }
    
    .keys {
      position: relative;
      display: flex;
      /* Ensure base size is preserved for scaling */
      min-width: max-content; 
    }
    
    .key {
      position: relative;
      border-radius: 0 0 4px 4px;
      cursor: pointer;
      user-select: none;
      transition: background 0.1s, transform 0.05s;
    }
    
    .white-key {
      width: 60px;
      height: 200px;
      background: #fff;
      border: 1px solid #ccc;
      z-index: 1;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding-bottom: 10px;
      color: #333;
      font-weight: bold;
      font-size: 0.8rem;
    }
    .white-key:active, .white-key.active {
      background: #eee;
      transform: translateY(2px);
      background: linear-gradient(to bottom, #fff 0%, #4ade80 100%);
    }
    
    .black-key {
      width: 40px;
      height: 120px;
      background: #000;
      border: 1px solid #000;
      position: absolute;
      z-index: 2;
      top: 0;
      /* Left is calculated in JS */
      color: #fff;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding-bottom: 10px;
      font-size: 0.7rem;
    }
    .black-key:active, .black-key.active {
      background: #333;
      background: linear-gradient(to bottom, #000 0%, #22c55e 100%);
    }
    
    /* UI Layout */
    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
      max-width: 800px;
      margin-bottom: 1.5rem;
    }
    .nav-link {
      color: #ccc; text-decoration: none; font-size: 0.9rem;
      padding: 0.5rem 1rem; border: 1px solid #333; border-radius: 4px;
    }
    .nav-link:hover { background: #333; color: #fff; }
    
    .nav-btn {
      background: transparent; border: 1px solid #333; color: #ccc;
      padding: 0.5rem 1rem; border-radius: 4px; cursor: pointer; font-size: 0.9rem;
    }
    .nav-btn:hover { background: #333; color: #fff; }
    
    .banner {
      background: #333; padding: 2px 8px; border-radius: 4px; color: #fbbf24; font-size: 0.8rem;
    }

    .piano-wrapper {
      display: flex;
      gap: 20px;
      align-items: stretch;
    }
    .history-container {
      display: flex;
      flex-direction: column;
      gap: 5px;
      align-items: center;
    }
    .history-bar {
      width: 60px;
      background: #111;
      border: 1px solid #333;
      border-radius: 8px;
      display: flex;
      flex-direction: column-reverse; /* Bottom up */
      align-items: center;
      padding: 10px;
      overflow: hidden;
      height: 240px; /* Match piano height approx */
      box-shadow: inset 0 0 10px rgba(0,0,0,0.8);
    }
    .history-note {
      font-size: 0.9rem;
      font-weight: bold;
      color: #4ade80;
      margin: 2px 0;
      opacity: 0;
      animation: slideIn 0.2s forwards;
    }
    .history-rest {
      width: 100%;
      height: 2px;
      background: #333;
      margin: 5px 0;
      opacity: 0.5;
    }
    @keyframes slideIn {
      0% { transform: translateY(10px); opacity: 0; }
      100% { transform: translateY(0); opacity: 1; }
    }
    
    .controls {
      margin-bottom: 1.5rem;
      display: flex;
      gap: 1rem;
      align-items: center;
    }
    button {
      padding: 0.8rem 1.5rem;
      border: none;
      border-radius: 50px;
      font-weight: bold;
      cursor: pointer;
      font-size: 1rem;
      transition: all 0.2s;
    }
    #recordBtn { background: #ef4444; color: white; }
    #recordBtn.recording { animation: pulse 1.5s infinite; }
    #playBtn { background: #3b82f6; color: white; }
    #saveBtn { background: #10b981; color: white; }
    #loadBtn { background: #8b5cf6; color: white; }
    #playBtn:disabled, #saveBtn:disabled { background: #333; color: #666; cursor: not-allowed; }
    
    .sm-btn {
      padding: 0.3rem 0.8rem;
      font-size: 0.7rem;
      background: #333;
      color: #ccc;
      border: 1px solid #444;
      border-radius: 4px;
      cursor: pointer;
    }
    .sm-btn:hover { background: #444; color: #fff; }
    
    @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }
    
    /* Dialog */
    dialog {
      background: #222; color: #fff; border: 1px solid #444; border-radius: 12px; padding: 1.5rem;
    }
    dialog::backdrop { background: rgba(0,0,0,0.7); }
    .field { margin-bottom: 1rem; }
    .field input[type="text"] { width: 100%; padding: 0.5rem; background: #333; border: 1px solid #444; color: #fff; }
    
    /* Audio Unlock */
    #audio-unlock {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.8);
      z-index: 9999;
      display: flex; justify-content: center; align-items: center;
    }
    
    /* Rotate Warning */
    #orientation-warning {
      display: none;
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: #121212;
      z-index: 10000;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      color: #fbbf24;
    }
    
    @media screen and (orientation: portrait) and (max-width: 900px) {
      #orientation-warning { display: flex; }
      .piano-wrapper, .controls { display: none; }
    }
    
    /* Mobile Scaling Force */
    @media (max-width: 850px) {
      .keys {
        zoom: 0.65; /* Effective on mobile WebKit */
        -moz-transform: scale(0.65);
        -moz-transform-origin: 0 0;
      }
      .piano-container {
        padding: 5px;
        justify-content: flex-start; /* Align left to prevent centering cut-off */
        overflow-x: auto; /* Safety scroll */
      }
      .history-bar { height: 160px; } /* Adjust history bar to match shrunk piano */
    }
    
    #unlockBtn {
      font-size: 1.5rem;
      padding: 1rem 2rem;
      background: #4ade80;
      color: #000;
      border: none; border-radius: 50px;
      cursor: pointer;
      box-shadow: 0 0 20px rgba(74, 222, 128, 0.5);
    }
    
    #log { margin-top: 1rem; color: #888; }
  </style>
</head>
<body>

  <h1>Smartly Piano 🎹</h1>
  
  <div class="top-bar">
    <a href="piano-landing.html" class="nav-link">← Exit</a>
    <span class="banner">⚠ AI Coach Module Under Development</span>
  </div>
  
  <div id="log" style="margin-bottom: 1rem; color: #4ade80; font-family: monospace;">
    Click keys or type (A-K, L, ; for White | W-U, I, O for Black)
  </div>
  
  <div class="controls">
    <button id="recordBtn">● Record</button>
    <button id="playBtn" disabled>▶ Playback</button>
    <button id="saveBtn" disabled>💾 Save</button>
    <button id="loadBtn">📂 Load</button>
    <input type="file" id="fileInput" accept=".txt" style="display:none">
    <span id="status">Ready</span>
  </div>

  <div class="piano-wrapper">
    <div class="piano-container">
      <div class="keys" id="piano">
        <!-- Generated by JS -->
      </div>
    </div>
    
    <div class="history-container">
      <button id="clearHistoryBtn" class="sm-btn">Clear</button>
      <div class="history-bar" id="historyBar">
        <!-- Notes appear here -->
      </div>
    </div>
  </div>
  
  <!-- Audio Unlock Overlay -->
  <div id="audio-unlock">
    <button id="unlockBtn">▶ Click to Enable Audio</button>
  </div>
  
  <!-- Orientation Warning -->
  <div id="orientation-warning">
    <h1>🔄 Please Rotate Device</h1>
    <p>Piano requires Landscape mode.</p>
  </div>

  <!-- Save Dialog -->
  <dialog id="saveDialog">
    <h3>Save Session</h3>
    <div class="field">
      <label>Filename:</label>
      <input type="text" id="filenameInput" value="piano-session" placeholder="filename">
    </div>
    <div class="field">
      <label><input type="checkbox" id="checkAudio" checked> Audio (.webm)</label><br>
      <label><input type="checkbox" id="checkSequence" checked> Notes (.txt)</label>
    </div>
    <div style="display:flex; justify-content:flex-end; gap:0.5rem;">
      <button id="cancelSaveBtn" style="background:#555">Cancel</button>
      <button id="confirmSaveBtn" style="background:#10b981">Download</button>
    </div>
  </dialog>

  <script>
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    const ctx = new AudioContext();
    
    const masterGain = ctx.createGain();
    masterGain.gain.value = 0.6;
    masterGain.connect(ctx.destination);
    
    const destStream = ctx.createMediaStreamDestination();
    masterGain.connect(destStream);
    const mediaRecorder = new MediaRecorder(destStream.stream);
    let audioChunks = [];

    // --- Sound Engine (Piano-ish) ---
    function playTone(freq) {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      
      osc.type = 'triangle'; // Smooth tone
      osc.frequency.value = freq;
      
      osc.connect(gain);
      gain.connect(masterGain);
      
      const now = ctx.currentTime;
      gain.gain.setValueAtTime(0, now);
      gain.gain.linearRampToValueAtTime(0.5, now + 0.02); // Fast attack
      gain.gain.exponentialRampToValueAtTime(0.001, now + 1.5); // Long decay (sustain)
      
      osc.start(now);
      osc.stop(now + 1.5);
    }

    // --- Piano Data ---
    // C4 Start
    const notes = [
      { note: 'C', freq: 261.63, type: 'white', key: 'A' },
      { note: 'C#', freq: 277.18, type: 'black', key: 'W' },
      { note: 'D', freq: 293.66, type: 'white', key: 'S' },
      { note: 'D#', freq: 311.13, type: 'black', key: 'E' },
      { note: 'E', freq: 329.63, type: 'white', key: 'D' },
      { note: 'F', freq: 349.23, type: 'white', key: 'F' },
      { note: 'F#', freq: 369.99, type: 'black', key: 'T' },
      { note: 'G', freq: 392.00, type: 'white', key: 'G' },
      { note: 'G#', freq: 415.30, type: 'black', key: 'Y' },
      { note: 'A', freq: 440.00, type: 'white', key: 'H' },
      { note: 'A#', freq: 466.16, type: 'black', key: 'U' },
      { note: 'B', freq: 493.88, type: 'white', key: 'J' },
      { note: 'C5', freq: 523.25, type: 'white', key: 'K' },
      { note: 'C#5', freq: 554.37, type: 'black', key: 'I' }, // Was O
      { note: 'D5', freq: 587.33, type: 'white', key: 'L' }, 
      { note: 'D#5', freq: 622.25, type: 'black', key: 'O' }, // Was P
      { note: 'E5', freq: 659.25, type: 'white', key: ';' } 
    ];

    const pianoEl = document.getElementById('piano');
    const historyEl = document.getElementById('historyBar');
    const keyMap = {}; // KeyChar -> NoteObject

    // Render Keys
    let whiteKeyCount = 0;
    
    notes.forEach(n => {
      const el = document.createElement('div');
      el.id = 'note-' + n.note;
      
      // Store in map for keyboard events
      keyMap[n.key] = { ...n, el: el };
      
      if (n.type === 'white') {
        el.className = 'key white-key';
        el.textContent = n.key; // Show keyboard hint
        pianoEl.appendChild(el);
        whiteKeyCount++;
      } else {
        el.className = 'key black-key';
        el.textContent = n.key;
        // Calculate position: Black keys sit between white keys
        // Width of white key = 60px
        // Gap is usually centered on the border
        // C# is between 1st (C) and 2nd (D) white keys
        // Offset = (Index of previous white key) * 60 - (BlackWidth/2) + border adjustment
        const offset = (whiteKeyCount * 60) - 20; // 40px width / 2
        el.style.left = offset + 'px';
        pianoEl.appendChild(el);
      }
      
      // Mouse Click Interaction
      const handleTrigger = (e) => {
        if (e.type === 'touchstart') e.preventDefault(); // Prevent scroll/zoom
        triggerNote(n);
      };
      
      el.addEventListener('mousedown', handleTrigger);
      el.addEventListener('touchstart', handleTrigger, { passive: false });
    });

    // --- Responsive Scaling ---
    function resizePiano() {
      const containerWidth = document.querySelector('.piano-container').clientWidth;
      const pianoWidth = whiteKeyCount * 60; // 60px per white key
      
      // If piano is wider than container, scale it down
      if (pianoWidth > containerWidth) {
        const scale = containerWidth / pianoWidth;
        pianoEl.style.transform = `scale(${scale})`;
        pianoEl.style.transformOrigin = 'left top';
        // Adjust container height because scaling leaves empty space
        pianoEl.style.marginBottom = `-${(1 - scale) * 200}px`; 
      } else {
        pianoEl.style.transform = 'scale(1)';
        pianoEl.style.marginBottom = '0';
      }
    }
    
    window.addEventListener('resize', resizePiano);
    // Call once after rendering
    setTimeout(resizePiano, 100);

    // --- Recording Logic ---
    let isRecording = false;
    let recordedSequence = [];
    let recordStartTime = 0;
    
    const recordBtn = document.getElementById('recordBtn');
    const playBtn = document.getElementById('playBtn');
    const saveBtn = document.getElementById('saveBtn');
    const loadBtn = document.getElementById('loadBtn');
    const fileInput = document.getElementById('fileInput');
    const clearHistoryBtn = document.getElementById('clearHistoryBtn');
    const statusEl = document.getElementById('status');
    const unlockOverlay = document.getElementById('audio-unlock');
    const unlockBtn = document.getElementById('unlockBtn');
    
    // Audio Unlock (Mobile)
    unlockBtn.addEventListener('click', () => {
      if (ctx.state === 'suspended') ctx.resume();
      unlockOverlay.style.display = 'none';
    });
    
    // Also try to unlock on first touch anywhere if overlay missed
    document.body.addEventListener('touchstart', function() {
      if (ctx.state === 'suspended') ctx.resume();
    }, { once: true });
    
    let lastNoteTime = 0;
    const CHORD_THRESHOLD = 70; // ms
    let currentHistoryGroup = null;
    
    mediaRecorder.ondataavailable = (e) => audioChunks.push(e.data);

    function triggerNote(noteObj, record = true) {
      if (ctx.state === 'suspended') ctx.resume();
      
      const now = Date.now();
      const delta = now - lastNoteTime;
      
      // Calculate Rest (Visual Spacer)
      if (lastNoteTime > 0 && delta > 800) { 
           const restEl = document.createElement('div');
           restEl.className = 'history-rest';
           historyEl.prepend(restEl);
           currentHistoryGroup = null; // Reset chord grouping on rest
      }
      
      playTone(noteObj.freq);
      
      // Visual Key
      if (noteObj.el) {
        noteObj.el.classList.add('active');
        setTimeout(() => noteObj.el.classList.remove('active'), 200);
      }
      
      // History Bar Logic
      // Check for Chord
      if (delta < CHORD_THRESHOLD && currentHistoryGroup) {
          // Append to existing group
          const span = document.createElement('span');
          span.style.marginLeft = "6px";
          span.textContent = noteObj.note;
          currentHistoryGroup.appendChild(span);
      } else {
          // New Group/Note
          const histItem = document.createElement('div');
          histItem.className = 'history-note';
          // Use a flex container for the note items
          histItem.style.display = "flex";
          histItem.style.justifyContent = "center";
          histItem.style.width = "100%";
          
          const span = document.createElement('span');
          span.textContent = noteObj.note;
          histItem.appendChild(span);
          
          historyEl.prepend(histItem);
          currentHistoryGroup = histItem;
      }
      
      if (historyEl.children.length > 30) {
        historyEl.lastElementChild.remove();
      }
      
      lastNoteTime = now;
      
      document.getElementById('log').textContent = `Playing: ${noteObj.note} (${noteObj.freq}Hz)`;
      
      if (record && isRecording) {
        recordedSequence.push({ 
          note: noteObj.note, 
          freq: noteObj.freq, 
          key: noteObj.key, 
          time: Date.now() - recordStartTime 
        });
      }
    }
    
    // Clear History
    clearHistoryBtn.addEventListener('click', () => {
      historyEl.innerHTML = '';
    });

    // Controls
    recordBtn.addEventListener('click', () => {
      if (!isRecording) {
        isRecording = true;
        recordedSequence = [];
        audioChunks = [];
        historyEl.innerHTML = ''; // Auto clear on record start
        recordStartTime = Date.now();
        lastNoteTime = 0; // Reset rest timer
        mediaRecorder.start();
        recordBtn.textContent = "■ Stop";
        recordBtn.classList.add('recording');
        statusEl.textContent = "Recording...";
        playBtn.disabled = true; saveBtn.disabled = true;
      } else {
        isRecording = false;
        mediaRecorder.stop();
        recordBtn.textContent = "● Record";
        recordBtn.classList.remove('recording');
        statusEl.textContent = `Saved ${recordedSequence.length} notes.`;
        if(recordedSequence.length>0) { playBtn.disabled = false; saveBtn.disabled = false; }
      }
    });
    
    // Load Logic
    loadBtn.addEventListener('click', () => fileInput.click());
    
    fileInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (!file) return;
      
      const reader = new FileReader();
      reader.onload = (event) => {
        const text = event.target.result;
        recordedSequence = [];
        historyEl.innerHTML = '';
        lastNoteTime = 0; // Fake timer for loading loop
        
        const lines = text.split('\n');
        let prevTime = 0;
        
        lines.forEach(line => {
           if (!line.includes('|') || line.startsWith('Smartly') || line.startsWith('Time')) return;
           const parts = line.split('|');
           if (parts.length >= 2) {
             const time = parseInt(parts[0].trim());
             const noteName = parts[1].trim();
             
             // Find note object
             const noteObj = notes.find(n => n.note === noteName);
             if (noteObj && !isNaN(time)) {
               recordedSequence.push({
                 note: noteObj.note,
                 freq: noteObj.freq,
                 key: noteObj.key,
                 time: time
               });
               
               // Render History Item (Manually)
               const delta = time - prevTime;
               if (delta > 800) {
                  const restEl = document.createElement('div');
                  restEl.className = 'history-rest';
                  historyEl.prepend(restEl);
               }
               prevTime = time;
               
               const histItem = document.createElement('div');
               histItem.className = 'history-note';
               histItem.textContent = noteObj.note;
               historyEl.prepend(histItem);
             }
           }
        });
        
        statusEl.textContent = `Loaded ${recordedSequence.length} notes.`;
        if (recordedSequence.length > 0) playBtn.disabled = false;
      };
      reader.readAsText(file);
      fileInput.value = '';
    });

    playBtn.addEventListener('click', () => {
      if(recordedSequence.length === 0) return;
      statusEl.textContent = "Playing...";
      playBtn.disabled = true;
      historyEl.innerHTML = ''; // Clear history for playback view
      
      recordedSequence.forEach((item, i) => {
        setTimeout(() => {
          // Reconstruct note object
          const el = document.getElementById('note-' + item.note);
          const n = { ...item, el: el };
          triggerNote(n, false);
          
          if(i === recordedSequence.length-1) {
            setTimeout(() => { 
              statusEl.textContent = "Ready"; 
              playBtn.disabled = false; 
            }, 1000);
          }
        }, item.time);
      });
    });

    // Save Dialog Logic
    const saveDialog = document.getElementById('saveDialog');
    saveBtn.addEventListener('click', () => saveDialog.showModal());
    document.getElementById('cancelSaveBtn').addEventListener('click', () => saveDialog.close());
    
    document.getElementById('confirmSaveBtn').addEventListener('click', () => {
      const filename = document.getElementById('filenameInput').value || "piano-session";
      
      if (document.getElementById('checkAudio').checked && audioChunks.length > 0) {
         const blob = new Blob(audioChunks, { type: 'audio/webm' });
         const url = URL.createObjectURL(blob);
         const a = document.createElement('a'); a.href = url; a.download = filename + ".webm"; a.click();
      }
      
      if (document.getElementById('checkSequence').checked && recordedSequence.length > 0) {
         let txt = "Smartly Piano Session\nTime | Note\n---\n";
         recordedSequence.forEach(n => txt += `${n.time} | ${n.note}\n`);
         const blob = new Blob([txt], { type: 'text/plain' });
         const url = URL.createObjectURL(blob);
         const a = document.createElement('a'); a.href = url; a.download = filename + ".txt"; a.click();
      }
      saveDialog.close();
    });

    // Keyboard Input
    document.addEventListener('keydown', (e) => {
      if (e.repeat) return;
      const char = e.key.toUpperCase();
      const note = keyMap[char];
      if (note) triggerNote(note);
    });

  </script>
</body>
</html>
