<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smartly Ideas — Next Level Idea Gathering</title>
  
  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Inter', sans-serif;
      background: #121212;
      color: #e0e0e0;
      line-height: 1.6;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    .container {
      max-width: 800px;
      margin: 2rem auto;
      padding: 2rem;
      background: #1e1e1e;
      border-radius: 12px;
      border: 1px solid #333;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 0.5rem;
      color: #fff;
      text-align: center;
    }
    
    .subtitle {
      color: #888;
      margin-bottom: 2rem;
      text-align: center;
      font-size: 1.1rem;
    }

    .badge {
      display: inline-block;
      padding: 0.2rem 0.6rem;
      background: #333;
      color: #4ade80;
      border-radius: 4px;
      font-size: 0.8rem;
      font-weight: 600;
      margin-bottom: 1rem;
      border: 1px solid #4ade80;
    }

    /* Input Form */
    .input-group {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      margin-bottom: 2rem;
      padding: 1.5rem;
      background: #2a2a2a;
      border-radius: 8px;
      border: 1px solid #444;
    }

    input, textarea, select {
      width: 100%;
      padding: 1rem;
      background: #1e1e1e;
      border: 1px solid #444;
      border-radius: 6px;
      color: #fff;
      font-family: inherit;
      font-size: 1rem;
    }

    input:focus, textarea:focus, select:focus {
      outline: none;
      border-color: #4ade80;
    }

    button {
      padding: 1rem;
      border: none;
      border-radius: 6px;
      font-weight: 600;
      cursor: pointer;
      font-size: 1rem;
      transition: all 0.2s;
    }

    .btn-primary {
      background: #4ade80;
      color: #000;
      width: 100%;
    }
    .btn-primary:hover { background: #22c55e; }

    .btn-secondary {
      background: #333;
      color: #ccc;
      padding: 0.5rem 1rem;
      font-size: 0.9rem;
    }
    .btn-secondary:hover { background: #444; color: #fff; }

    .btn-danger {
      background: #ef4444;
      color: #fff;
    }
    .btn-danger:hover { background: #dc2626; }

    /* Idea List */
    .idea-list {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .idea-card {
      background: #2a2a2a;
      padding: 1.5rem;
      border-radius: 8px;
      border-left: 4px solid #4ade80;
      position: relative;
    }

    .idea-card h3 {
      margin-bottom: 0.5rem;
      color: #fff;
    }

    .idea-meta {
      font-size: 0.8rem;
      color: #888;
      margin-bottom: 1rem;
      display: flex;
      gap: 1rem;
    }

    .idea-content {
      color: #ccc;
      white-space: pre-wrap; /* Preserve line breaks */
    }

    .card-actions {
      margin-top: 1rem;
      display: flex;
      gap: 0.5rem;
      justify-content: flex-end;
    }

    /* Data Controls */
    .data-controls {
      margin-top: 3rem;
      padding-top: 2rem;
      border-top: 1px solid #333;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .file-input { display: none; }

    footer {
      margin-top: auto;
      text-align: center;
      padding: 2rem;
      color: #666;
      font-size: 0.9rem;
    }
    
    footer a { color: #888; text-decoration: none; }
    footer a:hover { color: #fff; }

    /* Tags */
    .tag {
      background: #333;
      padding: 0.2rem 0.5rem;
      border-radius: 4px;
      font-size: 0.75rem;
      color: #aaa;
    }
  </style>
</head>
<body>

  <div class="container">
    <div style="text-align: center;">
      <span class="badge">BETA v0.1</span>
    </div>
    <h1>Smartly Ideas</h1>
    <p class="subtitle">A dedicated space for your next big thing.<br>
    <small style="color: #666;">(Data is stored locally in your browser. Use 'Export' to backup.)</small></p>

    <div style="text-align: center; margin-bottom: 2rem;">
        <a href="ideas-landing.html" style="color: #666; font-size: 0.9rem; text-decoration: none; border-bottom: 1px solid #444; padding-bottom: 2px;">← Home</a>
    </div>
    
    <!-- Input Form -->
    <div class="input-group">
      <input type="text" id="ideaTitle" placeholder="Idea Title (e.g., DNA Trash Tracking)" autofocus>
      <select id="ideaCategory">
        <option value="Business">Business</option>
        <option value="Tech">Tech</option>
        <option value="Art">Art</option>
        <option value="Personal">Personal</option>
        <option value="Other">Other</option>
      </select>
      <textarea id="ideaDetails" rows="4" placeholder="Describe your idea... What problem does it solve?"></textarea>
      <button class="btn-primary" onclick="addIdea()">Add to Collection</button>
    </div>

    <!-- List -->
    <div id="ideaList" class="idea-list">
      <!-- Ideas will be injected here -->
      <div style="text-align: center; color: #666; padding: 2rem;">No ideas yet. Start brainstorming!</div>
    </div>

    <!-- Data Controls -->
    <div class="data-controls">
      <div>
        <button class="btn-secondary" onclick="exportData()">⬇ Export Backup (.json)</button>
        <button class="btn-secondary" onclick="document.getElementById('importFile').click()">⬆ Import Backup</button>
        <input type="file" id="importFile" class="file-input" accept=".json" onchange="importData(this)">
      </div>
      <button class="btn-danger" style="padding: 0.5rem 1rem; font-size: 0.9rem;" onclick="clearData()">Clear All Data</button>
    </div>

    <div style="margin-top: 2rem; text-align: center; color: #555; font-size: 0.9rem;">
      <em>Coming Soon: AI Coach integration for brainstorming assistance.</em>
    </div>
  </div>

  <footer>
    <p>&copy; 2026 Smartly Academy. <a href="index.html">Back to Main</a></p>
  </footer>

  <script>
    // --- Data Model ---
    let ideas = [];

    // --- Init ---
    document.addEventListener('DOMContentLoaded', () => {
      loadIdeas();
      renderIdeas();
    });

    // --- Core Functions ---
    function addIdea() {
      const title = document.getElementById('ideaTitle').value.trim();
      const category = document.getElementById('ideaCategory').value;
      const details = document.getElementById('ideaDetails').value.trim();

      if (!title) {
        alert("Please give your idea a title!");
        return;
      }

      const newIdea = {
        id: Date.now(),
        title,
        category,
        details,
        timestamp: new Date().toISOString()
      };

      ideas.unshift(newIdea); // Add to top
      saveIdeas();
      renderIdeas();
      
      // Clear form
      document.getElementById('ideaTitle').value = '';
      document.getElementById('ideaDetails').value = '';
      document.getElementById('ideaTitle').focus();
    }

    function deleteIdea(id) {
      if(confirm("Are you sure you want to delete this idea?")) {
        ideas = ideas.filter(idea => idea.id !== id);
        saveIdeas();
        renderIdeas();
      }
    }

    function saveIdeas() {
      localStorage.setItem('smartly_ideas', JSON.stringify(ideas));
    }

    function loadIdeas() {
      const stored = localStorage.getItem('smartly_ideas');
      if (stored) {
        try {
          ideas = JSON.parse(stored);
        } catch (e) {
          console.error("Failed to parse ideas", e);
          ideas = [];
        }
      }
    }

    function renderIdeas() {
      const list = document.getElementById('ideaList');
      list.innerHTML = '';

      if (ideas.length === 0) {
        list.innerHTML = '<div style="text-align: center; color: #666; padding: 2rem;">No ideas yet. Start brainstorming!</div>';
        return;
      }

      ideas.forEach(idea => {
        const date = new Date(idea.timestamp).toLocaleDateString();
        
        const card = document.createElement('div');
        card.className = 'idea-card';
        card.innerHTML = `
          <div style="display:flex; justify-content:space-between; align-items:start;">
            <h3>${escapeHtml(idea.title)}</h3>
            <span class="tag">${escapeHtml(idea.category)}</span>
          </div>
          <div class="idea-meta">Added: ${date}</div>
          <div class="idea-content">${escapeHtml(idea.details)}</div>
          <div class="card-actions">
            <button class="btn-secondary" onclick="deleteIdea(${idea.id})" style="background:transparent; border:1px solid #444; color:#888;">Delete</button>
          </div>
        `;
        list.appendChild(card);
      });
    }

    // --- Utilities ---
    function escapeHtml(text) {
      if (!text) return text;
      return text
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function exportData() {
      const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(ideas, null, 2));
      const downloadAnchorNode = document.createElement('a');
      downloadAnchorNode.setAttribute("href", dataStr);
      downloadAnchorNode.setAttribute("download", "smartly_ideas_backup.json");
      document.body.appendChild(downloadAnchorNode);
      downloadAnchorNode.click();
      downloadAnchorNode.remove();
    }

    function importData(input) {
      const file = input.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = function(e) {
        try {
          const imported = JSON.parse(e.target.result);
          if (Array.isArray(imported)) {
            if(confirm("This will overwrite your current list. Are you sure?")) {
              ideas = imported;
              saveIdeas();
              renderIdeas();
              alert("Ideas imported successfully!");
            }
          } else {
            alert("Invalid file format.");
          }
        } catch (err) {
          alert("Error reading file: " + err);
        }
      };
      reader.readAsText(file);
      // Reset input so same file can be selected again
      input.value = '';
    }

    function clearData() {
      if(confirm("WARNING: This will delete ALL your ideas permanently. This cannot be undone. Proceed?")) {
        ideas = [];
        saveIdeas();
        renderIdeas();
      }
    }
  </script>

</body>
</html>
